<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng Quản Lý UID</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Danh sách UID</h4>
    <div>
      <button id="copyLinks" class="btn btn-primary btn-sm me-1">Copy link</button>
      <button id="removeSelected" class="btn btn-danger btn-sm me-1">Xoá</button>
      <button id="editSelected" class="btn btn-warning btn-sm">Sửa</button>
    </div>
  </div>

  <table id="uidTable" class="table table-striped table-bordered nowrap" style="width:100%">
    <thead>
      <tr>
        <th><input type="checkbox" id="selectAll"></th>
        <th>STT</th>
        <th>Số điện thoại</th>
        <th>Liên kết</th>
        <th>Trạng thái</th>
        <th>Hành động</th>
      </tr>
    </thead>
    <tbody>
      <% if (data && data.length) { %>
        <% data.forEach((item, index) => { %>
          <tr>
            <td><input type="checkbox" class="rowCheckbox"></td>
            <td><%= index + 1 %></td>
            <td contenteditable="true"><%= item.phone %></td>
            <td><a href="<%= item.link %>" target="_blank"><%= item.link %></a></td>
            <td><%= item.status || 'Chưa gửi' %></td>
            <td>
              <button class="btn btn-sm btn-info copySingle" data-link="<%= item.link %>">Copy</button>
              <button class="btn btn-sm btn-danger deleteRow">Xoá</button>
            </td>
          </tr>
        <% }) %>
      <% } %>
    </tbody>
  </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {
  const table = $('#uidTable').DataTable({
    responsive: true,
    pageLength: 10
  });

  // Chọn tất cả
  $('#selectAll').on('click', function() {
    $('.rowCheckbox').prop('checked', this.checked);
  });

  // Copy toàn bộ link
  $('#copyLinks').on('click', function() {
    let links = [];
    $('.rowCheckbox:checked').each(function() {
      const row = $(this).closest('tr');
      links.push(row.find('a').attr('href'));
    });
    if (links.length) {
      navigator.clipboard.writeText(links.join('\n'));
      alert('Đã copy ' + links.length + ' link vào clipboard!');
    }
  });

  // Copy 1 link
  $(document).on('click', '.copySingle', function() {
    const link = $(this).data('link');
    navigator.clipboard.writeText(link);
    alert('Đã copy link: ' + link);
  });

  // Xoá hàng
  $(document).on('click', '.deleteRow', function() {
    table.row($(this).closest('tr')).remove().draw();
  });
});
</script>
</body>
</html>
